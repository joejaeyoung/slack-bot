services:
  bot:
    build: .
    env_file: .env
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: scheduler
      PGUSER: bot
      PGPASSWORD: bot
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: scheduler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
