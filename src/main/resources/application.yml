spring:
  application:
    name: scheduler-bot
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

slack:
  bot-token: ${SLACK_BOT_TOKEN}
  signing-secret: ${SLACK_SIGNING_SECRET}
  channel:
    team: ${SLACK_CHANNEL_TEAM}
    scrum: ${SLACK_CHANNEL_SCRUM}

google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}

jira:
  host: ${JIRA_HOST}
  email: ${JIRA_EMAIL}
  api-token: ${JIRA_API_TOKEN}

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.custom.bot: DEBUG
